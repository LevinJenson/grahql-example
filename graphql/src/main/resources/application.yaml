server:
  port: 8080

spring:
  application:
    name: graphql

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/graphql
    username: appuser
    password: apppass

  graphql:
    graphiql:
      path: /graphiql
      enabled: true

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
